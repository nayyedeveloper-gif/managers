kind = "web"
previewPath = "/"
title = "Clipup"
version = "1.0.0"
id = "artifacts/clipup"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21749

[services.development]
run = "pnpm --filter @workspace/clipup run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/clipup", "run", "build" ]
publicDir = "artifacts/clipup/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21749"
BASE_PATH = "/"
